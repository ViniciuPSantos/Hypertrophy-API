services:
  mysql:
    image: mysql:8.0
    container_name: hypertrophy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - hypertrophy-mysql-data:/var/lib/mysql

volumes:
  hypertrophy-mysql-data: