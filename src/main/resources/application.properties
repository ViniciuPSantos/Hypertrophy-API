# Server
server.port=8080

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hypertrophy?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:mudar-este-segredo-em-producao-minimo-256-bits-aqui}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Logging
logging.level.com.hypertrophy=DEBUG
logging.level.org.springframework.security=INFO